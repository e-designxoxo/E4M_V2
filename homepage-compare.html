<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E4M Homepage — Version Comparison</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Avenir Next",system-ui,sans-serif;background:#0d2b01;color:#EEEBD9}

/* ── HEADER BAR ── */
.compare-bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(13,43,1,.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(238,235,217,.1);
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;
  gap:1rem;
}
.compare-bar__title{
  font-size:.75rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(238,235,217,.5);
  flex-shrink:0;
}
.compare-bar__tabs{
  display:flex;gap:.5rem;
}
.tab-btn{
  padding:.4rem 1.1rem;
  font-size:.75rem;font-weight:600;letter-spacing:.06em;
  border:1px solid rgba(238,235,217,.15);
  background:none;color:rgba(238,235,217,.5);
  cursor:pointer;
  transition:background .2s,color .2s,border-color .2s;
  border-radius:3px;
  font-family:inherit;
}
.tab-btn:hover{color:#EEEBD9;border-color:rgba(238,235,217,.35)}
.tab-btn.is-active{
  background:#EEEBD9;color:#0d2b01;border-color:#EEEBD9;
}
.compare-bar__note{
  font-size:.68rem;color:rgba(238,235,217,.3);
  white-space:nowrap;
  flex-shrink:0;
}

/* ── VIEWS ── */
.view{
  display:none;
  position:fixed;
  top:52px;left:0;right:0;bottom:0;
}
.view.is-active{display:flex;}

/* SIDE BY SIDE */
.view--split{gap:0;}
.split-pane{
  flex:1;
  position:relative;
  overflow:hidden;
  border-right:2px solid rgba(238,235,217,.12);
}
.split-pane:last-child{border-right:none}
.split-pane__label{
  position:absolute;top:1rem;left:50%;transform:translateX(-50%);
  z-index:10;
  background:rgba(13,43,1,.9);
  border:1px solid rgba(238,235,217,.15);
  padding:.35rem .9rem;
  font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(238,235,217,.6);
  white-space:nowrap;
  pointer-events:none;
  border-radius:3px;
}
.split-pane iframe{
  width:100%;height:100%;border:none;
  /* Scale down to fit half viewport — desktop site in half width */
  transform-origin:top left;
}

/* FULL single view */
.view--single{flex-direction:column;}
.view--single iframe{
  flex:1;border:none;width:100%;
}

/* ── RESIZE HANDLE ── */
.resize-handle{
  width:4px;
  background:rgba(238,235,217,.08);
  cursor:col-resize;
  flex-shrink:0;
  transition:background .2s;
  position:relative;
  z-index:5;
}
.resize-handle:hover,.resize-handle.is-dragging{background:rgba(238,235,217,.35)}
.resize-handle::after{
  content:'';
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:2px;height:40px;
  background:rgba(238,235,217,.4);
  border-radius:1px;
}
</style>
</head>
<body>

<!-- CONTROL BAR -->
<div class="compare-bar">
  <span class="compare-bar__title">E4M Homepage — Design Review</span>
  <div class="compare-bar__tabs">
    <button class="tab-btn is-active" onclick="setView('split')">Side by side</button>
    <button class="tab-btn" onclick="setView('v1')">V1 — Original</button>
    <button class="tab-btn" onclick="setView('v4')">V4 — New hero</button>
  </div>
  <span class="compare-bar__note">Drag the centre bar to resize · Click panels to navigate</span>
</div>

<!-- SIDE BY SIDE -->
<div class="view view--split is-active" id="view-split">
  <div class="split-pane" id="pane-left" style="flex:1">
    <div class="split-pane__label">V1 — Original homepage</div>
    <iframe
      src="https://e-designxoxo.github.io/E4M_V2/homepage.html"
      title="V1 Original homepage"
      loading="lazy"
      id="iframe-v1-split">
    </iframe>
  </div>
  <div class="resize-handle" id="resize-handle"></div>
  <div class="split-pane" id="pane-right" style="flex:1">
    <div class="split-pane__label">V4 — New hero concept</div>
    <iframe
      src="homepage-v4-hero.html"
      title="V4 New hero"
      loading="lazy"
      id="iframe-v4-split">
    </iframe>
  </div>
</div>

<!-- FULL V1 -->
<div class="view view--single" id="view-v1">
  <iframe
    src="https://e-designxoxo.github.io/E4M_V2/homepage.html"
    title="V1 Original homepage — full"
    loading="lazy">
  </iframe>
</div>

<!-- FULL V4 -->
<div class="view view--single" id="view-v4">
  <iframe
    src="homepage-v4-hero.html"
    title="V4 New hero — full"
    loading="lazy">
  </iframe>
</div>

<script>
/* ── Tab switching ── */
function setView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('is-active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('is-active'));
  document.getElementById('view-'+v).classList.add('is-active');
  event.currentTarget.classList.add('is-active');
}

/* ── Drag to resize split panes ── */
const handle = document.getElementById('resize-handle');
const left = document.getElementById('pane-left');
const right = document.getElementById('pane-right');
const container = document.getElementById('view-split');
let dragging = false;

handle.addEventListener('mousedown', e=>{
  dragging = true;
  handle.classList.add('is-dragging');
  e.preventDefault();
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const rect = container.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const total = rect.width - 4; /* handle width */
  const leftPct = Math.max(20, Math.min(80, (x/total)*100));
  left.style.flex = 'none';
  left.style.width = leftPct+'%';
  right.style.flex = '1';
  right.style.width = '';
});
window.addEventListener('mouseup', ()=>{
  dragging = false;
  handle.classList.remove('is-dragging');
});
</script>
</body>
</html>
